<html>
<style>
    .test {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .test .menu-btn {
        display: inline-block;
        position: relative;
        width: 30px;
        height: 8px;
        background-color: #161616;
    }

    .test .menu-btn:before,
    .test .menu-btn:after {
        width: 30px;
        height: 8px;
        background-color: #161616;
        content: "";
        position: absolute;
    }

    /* before を少し上にずらして描画 */
    .test .menu-btn:before {
        top: 10px;
    }

    /* after を少し下にずらして描画 */
    .test .menu-btn:after {
        bottom: 10px;
    }
</style>

<div class="test">
    <div class="menu-btn">
    </div>
</div>

</html>
